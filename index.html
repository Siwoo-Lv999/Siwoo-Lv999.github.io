<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>박시우</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --text: #f0ede6;
      --accent: #c8a97e;
      --muted: #444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif KR', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.35;
    }

    .container {
      text-align: center;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    .label {
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
    }

    .name {
      font-size: clamp(4rem, 12vw, 9rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      position: relative;
      display: inline-block;
    }

    .name::after {
      content: '';
      display: block;
      height: 2px;
      background: var(--accent);
      margin-top: 1.2rem;
      transform: scaleX(0);
      transform-origin: left;
      animation: lineGrow 0.9s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
    }

    .sub {
      margin-top: 1.8rem;
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.12em;
      opacity: 0;
      animation: fadeUp 1s ease 1.4s forwards;
    }

    /* decorative corner lines */
    .corner {
      position: fixed;
      width: 40px;
      height: 40px;
      border-color: var(--muted);
      border-style: solid;
      opacity: 0.4;
    }
    .corner.tl { top: 2rem; left: 2rem; border-width: 1px 0 0 1px; }
    .corner.tr { top: 2rem; right: 2rem; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 2rem; left: 2rem; border-width: 0 0 1px 1px; }
    .corner.br { bottom: 2rem; right: 2rem; border-width: 0 1px 1px 0; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes lineGrow {
      to { transform: scaleX(1); }
    }
  </style>
</head>
<body>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="container">
    <p class="label">Portfolio</p>
    <h1 class="name">박시우</h1>
    <p class="sub">Coming soon</p>
  </div>
</body>
</html>
